<!DOCTYPE html>
<html>

<head>
  <title>DARTS - Time to Score</title>

  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">

  <script src="js/alpine.js" defer></script>

  <style>
    :root {
      --col-count: 4;
    }
    
    * {
      box-sizing: border-box;
      font-family: monospace;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    html,
    body {
      padding: 0;
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      background-color: #444444;
    }
    
    .settings-card {
      width: 95%;
      margin-left: auto;
      margin-right: auto;
      margin-top: 2rem;
      padding: 2rem;
      border-radius: 1rem;
      border: 5px outset blue;
      background-color: #DDDDDD;
    }
    
    li {
      padding: 2rem;
      margin-left: 2rem;
    }
    
    .header {
      width: 100%;
      height: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
    }

    .undo-wrap {
      text-align: left;
      padding-left: 1rem;
    }

    .settings-wrap {
      text-align: right;
      padding-right: 1rem;
    }
    
    .player-wrap {
      text-align: center;
    }

    .player-wrap span {
      text-shadow: 0 0 5px yellow;
      color: white;
      font-size: 2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .dart-image {
      max-height: 1.75rem;
      margin-left: 0.25rem;
      margin-right: 0.25rem;
    }

    #score-buttons {
      width: 100vw;
      height: calc(100vh - 2.5rem); /* Header plus bottom padding */
      padding-bottom: 0.5rem;
      display: grid;
      grid-template-columns: repeat(var(--col-count), 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
      align-items: center;
      text-align: center;
      line-height: 1;
    }
    
    .new-player-wrap input {
      width: 9rem;
    }

    .point-button,
    .point-button-sm,
    .point-button-wide {
      color: white;
      font-size: min(12vw, 12vh);
      width: 18vw;
      outline: 3px solid black;
      border: 0;
      border-radius: 10px;
    }

    .point-button:hover,
    .point-button-sm:hover,
    .point-button-wide:hover {
      color: yellow;
      outline-color: blue;
      text-shadow: 0 0 5px blue;
    }
    
    .point-button-sm,
    .point-button-wide {
      font-size: min(min(5vw, 5vh), 3rem);
    }

    .point-button-wide {
      width: 43vw;
    }
  </style>
  
  <script>
    const PASS_0 = 21;
    const OUTER_RING_25 = 25;
    const BULLSEYE_50 = 50;
    const COLOR_BLUE = "steelblue";
    const COLOR_BLACK = "#181818";
    const COLOR_GREEN = "#277D58";
    const COLOR_RED = "#FC2E2E";
    let COLOR_GREEN_CURRENT = COLOR_GREEN;
    let COLOR_RED_CURRENT = COLOR_RED;
    const GAME_301 = 301;
    const GAME_501 = 501;
    const ORIGINAL_DART_MAP = {
      "1": COLOR_GREEN_CURRENT, "2": COLOR_RED_CURRENT, "3": COLOR_RED_CURRENT, "4": COLOR_GREEN_CURRENT,
      "5": COLOR_GREEN_CURRENT, "6": COLOR_GREEN_CURRENT, "7": COLOR_RED_CURRENT, "8": COLOR_RED_CURRENT,
      "9": COLOR_GREEN_CURRENT, "10": COLOR_RED_CURRENT, "11": COLOR_GREEN_CURRENT, "12": COLOR_RED_CURRENT,
      "13": COLOR_RED_CURRENT, "14": COLOR_RED_CURRENT, "15": COLOR_GREEN_CURRENT, "16": COLOR_GREEN_CURRENT,
      "17": COLOR_GREEN_CURRENT, "18": COLOR_RED_CURRENT, "19": COLOR_GREEN_CURRENT, "20": COLOR_RED_CURRENT,
      [PASS_0]: COLOR_BLACK, [OUTER_RING_25.toString()]: COLOR_GREEN_CURRENT, [BULLSEYE_50.toString()]: COLOR_RED_CURRENT
    };
    let DEFAULT_DART_MAP = structuredClone(ORIGINAL_DART_MAP);
    
    let COL_COUNT;
    document.addEventListener('alpine:initialized', () =>
      COL_COUNT = Number.parseInt(
        window.getComputedStyle(document.documentElement).getPropertyValue("--col-count")
      )
    );
  </script>
</head>

<body x-data="
{
  showSettings: false,
  addPlayer: null,
  scoreSingleColor: false,
  dartMap: DEFAULT_DART_MAP,
  chosenScore: null, // Will be set when a score is chosen
  lastScores: [], // Last recorded scores to be able to Undo
  currentThrows: 0,
  currentPlayerRef: null, // Current player, if any
  players: [], // Array of player objects: name, currentScore, startScore (301 or 501)
  init() {
    // TODO Local storage for current game state and scores, in case of accidental refresh, etc.
    this.players.push(
      {name: 'Thunder', currentScore: GAME_301, startScore: GAME_301},
      {name: 'Lightning', currentScore: GAME_301, startScore: GAME_301},
    );
    this.currentPlayerRef = this.players[0];
  },
  isSpecialScore(score) {
    return score == PASS_0 || this.isRingScore(score);
  },
  isRingScore(score) {
    return score == OUTER_RING_25 || score == BULLSEYE_50;
  },
  getScoreLabel(score) {
    if (score == PASS_0) {
      return 'Zero';
    }
    else if (score == OUTER_RING_25) {
      return '25 Outer';
    }
    else if (score == BULLSEYE_50) {
      return '50 Bullseye';
    }
    return score;
  },
  prevPlayerTurn(optionalScoreAfter) {
    const currentPlayerIndex = this.players.indexOf(this.currentPlayerRef);
    let newPlayerIndex = currentPlayerIndex-1;
    if (newPlayerIndex < 0) {
      newPlayerIndex = this.players.length-1;
    }
    
    // Change to the previous player THEN apply the undone score
    this.currentPlayerRef = this.players[newPlayerIndex];
    if (typeof optionalScoreAfter === 'number') {
      this.currentPlayerRef.currentScore += optionalScoreAfter;
    }
  },
  nextPlayerTurn(optionalScoreBefore) {
    const currentPlayerIndex = this.players.indexOf(this.currentPlayerRef);
    let newPlayerIndex = currentPlayerIndex+1;
    if (newPlayerIndex >= this.players.length) {
      newPlayerIndex = 0;
    }
    
    // Apply the score to the current player THEN go to the next player
    if (typeof optionalScoreBefore === 'number') {
      this.applyScore(optionalScoreBefore);
    }
    this.currentPlayerRef = this.players[newPlayerIndex];
    this.currentThrows = 0;
  },
  addNewPlayer() {
    this.addPlayer = {
      name: 'New',
      startScore: GAME_301
    };
  },
  saveNewPlayer(event) {
    event.preventDefault();
    
    if (this.addPlayer?.name?.trim().length &&
        !Number.isNaN(Number.parseInt(this.addPlayer?.startScore))) {
      this.addPlayer.currentScore = this.addPlayer.startScore;
      this.players.push(this.addPlayer);
      this.addPlayer = null;
      
      if (!this.currentPlayerRef) {
        this.currentPlayerRef = this.players[0];
      }
    }
  },
  removePlayer(playerObj) {
    this.players.splice(this.players.indexOf(playerObj), 1);
    
    this.currentPlayerRef = this.players[0];
    console.log('CURRENT PLAYER REF IS', this.currentPlayerRef);
    this.currentThrows = 0;
  },
  chooseScore(score, multiplier) {
    if (this.isSpecialScore(score)) {
      if (score == PASS_0) {
        score = 0;
      }
      this.applyThrow(1, score);
    }
    else {
      // Choose an initial score, change view to show multipliers
      if (typeof multiplier !== 'number') {
        this.dartMap = this.makeMultiplierMap(score);
        this.chosenScore = score;
      }
      // Have a score already, now choosing a multiplier
      else if (this.chosenScore !== null) {
        score *= multiplier;
        this.applyThrow(1, score);
        this.dartMap = DEFAULT_DART_MAP;
        this.chosenScore = null;
      }
    }
  },
  applyThrow(modifier, score, fromUndo) { // modifier = positive on valid throw, negative on Undo
    this.currentThrows += modifier;
    
    // Rotate to the next player automatically after our turn
    if (this.currentThrows >= 3) {
      this.nextPlayerTurn(score);
    }
    // If we undid until the previous player swap to them
    else if (this.currentThrows < 0) {
      this.prevPlayerTurn(score);
      this.currentThrows = 2;
    }
    else {
      this.applyScore(score, fromUndo);
    }
    
    if (modifier > 0) {
      this.lastScores.unshift(score);
    }
  },
  applyScore(score, fromUndo) {
    const potentialNewScore = this.currentPlayerRef.currentScore - score;
    
    if (!fromUndo) {
      if (potentialNewScore < 0) {
        alert(`${this.currentPlayerRef.name} threw a ${score} and BUSTED with ${potentialNewScore}, next turn...`);
        
        this.dartMap = DEFAULT_DART_MAP;
        this.chosenScore = null;
        for (let i = 0; i < this.currentThrows; i++) {
          this.doUndo();
        }
        
        this.nextPlayerTurn();
        return;
      }
      else if (!fromUndo && potentialNewScore === 0) {
        this.currentPlayerRef.currentScore = 0; // We did it
        
        alert(`${this.currentPlayerRef.name} WON!\n\nScores:\n${this.players.map(player => player.name + ': ' + player.currentScore).join('\n')}\n\nRestarting...`);
        window.location.reload();
        return;
      }
    }
    
    // Want to go back in time for an undo
    if (fromUndo) {
      score *= -1;
    }
    
    this.currentPlayerRef.currentScore -= score;
  },
  doUndo() {
    // If we have a temporary score chosen, but no multiplier, just clear that
    if (this.chosenScore !== null) {
      this.dartMap = DEFAULT_DART_MAP;
      this.chosenScore = null;
    }
    // Otherwise undo the last set score
    else if (this.lastScores?.length) {
      this.applyThrow(-1, this.lastScores.shift(), true);
    }
  },
  makeMultiplierMap(score) {
    const allKeys = Object.keys(DEFAULT_DART_MAP);
    const gridKeys = allKeys.slice(0, -3);
    const newMap = Object.fromEntries(allKeys.map((key) => [key, '']));

    const clickedIndex = gridKeys.indexOf(score.toString());
    const clickedCol = clickedIndex % COL_COUNT;
    const clickedRow = Math.floor(clickedIndex / COL_COUNT);
    const rowCount = Math.ceil(gridKeys.length / COL_COUNT);
    const direction = clickedRow + 2 < rowCount ? 1 : -1;

    [0, 1, 2].forEach((offset) => {
      const row = clickedRow + offset * direction;
      const index = row * COL_COUNT + clickedCol;

      newMap[gridKeys[index]] = `${offset + 1}x`;
    });
    
    return newMap;
  },
  changeColorPalette(isChecked) {
    if (isChecked) {
      Object.keys(DEFAULT_DART_MAP).forEach(key => {
        DEFAULT_DART_MAP[key] = COLOR_BLUE;
      });
    }
    else {
      DEFAULT_DART_MAP = structuredClone(ORIGINAL_DART_MAP);
    }
  },
}"
>
    <div class="header">
      <div class="undo-wrap">
        <button @click="doUndo()" :disabled="(chosenScore === null && !lastScores?.length)" x-text="`Undo (${chosenScore ?? (lastScores?.[0] ?? '...')})`"></button>
      </div>
      <div class="player-wrap">
        <span x-text="`${currentPlayerRef?.name ?? 'None'} (${currentPlayerRef?.currentScore ?? 'Add a new player!'})`"></span>
        <template x-for="i in currentThrows">
          <img src="img/dart.png" :alt="`Dart ${i}`" :title="`Dart ${i}`" class="dart-image">
        </template>
      </div>
      <div class="settings-wrap"><button @click="showSettings = !showSettings" :disabled="!players?.length" x-text="showSettings ? 'Save' : 'Settings'"></button></div>
    </div>
    <template x-if="!showSettings && currentPlayerRef">
      <div>
        <div id="score-buttons">
          <template x-for="[score, cell] in Object.entries(dartMap)" :key="score">
            <div :style="score == BULLSEYE_50 ? 'grid-column: span 2;' : ''">
              <button
                x-text="chosenScore === null
                  ? (!isSpecialScore(score) ? score : getScoreLabel(score))
                  : (cell || '-')"
                :class="`point-button${isSpecialScore(score) ? (score == BULLSEYE_50 ? '-wide' : '-sm') : ''}`"
                :style="`visibility: ${cell ? 'visible' : 'hidden'}; background-color: ${chosenScore === null ? (DEFAULT_DART_MAP[score] ?? COLOR_GREEN) : 'indigo'};`"
                @click="chosenScore === null
                  ? chooseScore(Number.parseInt(score, 10))
                  : chooseScore(chosenScore, Number.parseInt(cell, 10))">
              </button>
            </div>
          </template>
        </div>
      </div>
    </template>
    <template x-if="showSettings">
    <div>
      <div class="settings-card">
        <label>
          <input type="checkbox" x-model="scoreSingleColor" @change="changeColorPalette($event.target.checked)"></input>
          Score buttons use <span :style="`background-color: ${COLOR_BLUE}`">single color</span> instead of <span :style="`background-color: ${COLOR_RED}`">red</span> and <span :style="`background-color: ${COLOR_GREEN}`">green</span>
        </label>
      </div>
      <div class="settings-card">
        <ol>
          <template x-for="player in players">
            <li>
              <b x-text="player.name"></b>
              <span x-text="`(Score ${player.currentScore} of ${player.startScore})`"></span>
              <br>
              <button @click="removePlayer(player)">Remove</button>
              <button @click="player.currentScore = window.prompt(`Enter adjusted score (current is ${player.currentScore})`, player.currentScore) ?? player.currentScore">Change Score</button>
              <button @click="currentPlayerRef = player">Give Turn</button>
            </li>
          </template>
          <li>
            <template x-if="!addPlayer">
              <button @click="addNewPlayer();">Add New Player</button>
            </template>
            <template x-if="addPlayer">
              <form class="new-player-wrap">
                <input x-ref="nameIn" x-model="addPlayer.name" placeholder="Name" autofocus></input>
                <input x-model="addPlayer.startScore" placeholder="Goal Score"></input>
                <br><br>
                <button @click="saveNewPlayer($event)">Save New Player</button>
              </form>
            </template>
          </li>
        </ol>
      </div>
    </div>
    </template>
</body>

</html>
