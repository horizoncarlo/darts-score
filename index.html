<!DOCTYPE html>
<html>

<head>
  <title>DARTS - Time to Score</title>

  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1">

  <script src="js/alpine.js" defer></script>

  <style>
    :root {
      --col-count: 4;
    }
    
    * {
      box-sizing: border-box;
      font-family: monospace;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    html,
    body {
      padding: 0;
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      background-color: #444444;
    }
    
    .settings-card {
      width: 95%;
      margin-left: auto;
      margin-right: auto;
      margin-top: 2rem;
      padding: 2rem;
      border-radius: 1rem;
      border: 5px outset blue;
      background-color: #DDDDDD;
    }
    
    li {
      padding: 2rem;
      margin-left: 2rem;
    }
    
    .header {
      width: 100%;
      height: 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
    }

    .undo-wrap {
      text-align: left;
      padding-left: 1rem;
    }

    .settings-wrap {
      text-align: right;
      padding-right: 1rem;
    }
    
    .player-wrap {
      text-align: center;
    }

    .player-wrap span {
      text-shadow: 0 0 5px yellow;
      color: white;
      font-size: 2rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .dart-image {
      max-height: 1.75rem;
      margin-left: 0.25rem;
      margin-right: 0.25rem;
    }

    #score-buttons {
      width: 100vw;
      height: calc(100vh - 2.5rem); /* Header plus bottom padding */
      padding-bottom: 0.5rem;
      display: grid;
      grid-template-columns: repeat(var(--col-count), 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 0;
      align-items: center;
      text-align: center;
      line-height: 1;
    }
    
    .new-player-wrap input {
      width: 9rem;
    }

    .point-button,
    .point-button-sm,
    .point-button-wide {
      color: white;
      font-size: min(12vw, 12vh);
      width: 18vw;
      outline: 3px solid black;
      border: 0;
      border-radius: 10px;
    }

    .point-button:hover,
    .point-button-sm:hover,
    .point-button-wide:hover {
      color: yellow;
      outline-color: blue;
      text-shadow: 0 0 5px blue;
    }
    
    .point-button-sm,
    .point-button-wide {
      font-size: min(min(5vw, 5vh), 3rem);
    }

    .point-button-wide {
      width: 43vw;
    }
  </style>
  
  <script>
    const LS_GAMESTATE = "dartsState";
    
    const DEFAULT_GAME_SCORE = 301; // Or 501 for more experienced players
    const PASS_0 = 21;
    const OUTER_RING_25 = 25;
    const BULLSEYE_50 = 50;
    
    const COLOR_BLUE = "steelblue";
    const COLOR_BLACK = "#181818";
    const COLOR_GREEN = "#277D58";
    const COLOR_RED = "#FC2E2E";

    const ORIGINAL_DART_MAP = {
      "1": COLOR_GREEN, "2": COLOR_RED, "3": COLOR_RED, "4": COLOR_GREEN,
      "5": COLOR_GREEN, "6": COLOR_GREEN, "7": COLOR_RED, "8": COLOR_RED,
      "9": COLOR_GREEN, "10": COLOR_RED, "11": COLOR_GREEN, "12": COLOR_RED,
      "13": COLOR_RED, "14": COLOR_RED, "15": COLOR_GREEN, "16": COLOR_GREEN,
      "17": COLOR_GREEN, "18": COLOR_RED, "19": COLOR_GREEN, "20": COLOR_RED,
      [PASS_0]: COLOR_BLACK, [OUTER_RING_25.toString()]: COLOR_GREEN, [BULLSEYE_50.toString()]: COLOR_RED
    };
    
    let DEFAULT_DART_MAP = structuredClone(ORIGINAL_DART_MAP);
    let COL_COUNT;
    document.addEventListener('alpine:initialized', () =>
      COL_COUNT = Number.parseInt(
        window.getComputedStyle(document.documentElement).getPropertyValue("--col-count")
      )
    );
    
    const PLAYER_NAMES = [
      "Thunder",
      "Lightning",
      "Glitz",
      "Viper",
      "Bullseye",
      "Phantom",
      "Blaze",
      "Venom",
      "Rogue",
      "Ice",
      "Havoc",
      "Maverick",
      "Outlaw",
      "Nitro",
      "Falcon",
      "Tempest",
      "Inferno",
      "Shadow",
      "Cyclone",
      "Vortex"
    ];
  </script>
</head>

<body x-data="
{
  state: {
    showSettings: false,
    addPlayer: null,
    scoreSingleColor: false,
    dartMap: DEFAULT_DART_MAP,
    chosenScore: null, // Will be set when a score is chosen
    lastScores: [], // Last recorded scores to be able to Undo
    currentThrows: 0,
    currentPlayerRef: null, // Current player, if any
    players: [], // Array of player objects: name, currentScore, startScore (301 or 501)
  },
  init() {
    // Set some default players
    if (!this.loadFromStorage()) {
      this.state.players.push(
        {name: this.getRandomName(), currentScore: DEFAULT_GAME_SCORE, startScore: DEFAULT_GAME_SCORE},
        {name: this.getRandomName(), currentScore: DEFAULT_GAME_SCORE, startScore: DEFAULT_GAME_SCORE},
      );
      this.state.currentPlayerRef = this.state.players[0];
    }
    
    // Auto-save to storage on change
    this.$watch('state', () => {
      this.saveToStorage();
    });
  },
  saveToStorage() {
    // Strip out a few properties that are fairly transient and take needless space
    const { lastScores, chosenScore, dartMap, ...toSave } = this.state;
    
    localStorage.setItem(LS_GAMESTATE, JSON.stringify(toSave));
  },
  loadFromStorage() {
    let potentialLoad = localStorage.getItem(LS_GAMESTATE);
    
    if (potentialLoad?.trim()?.length) {
      try {
        potentialLoad = JSON.parse(potentialLoad);
        this.state = potentialLoad;
        
        // Restore some basic transient defaults
        this.state.lastScores = [];
        this.state.dartMap = DEFAULT_DART_MAP;
        this.state.chosenScore = null;
        
        // Apply our color choices
        this.changeColorPalette(this.state.scoreSingleColor);
        
        return true;
      } catch (err) {
        console.error('Failed to load saved game state', err);
      }
    }
    
    return false;
  },
  isSpecialScore(score) {
    return score == PASS_0 || this.isRingScore(score);
  },
  isRingScore(score) {
    return score == OUTER_RING_25 || score == BULLSEYE_50;
  },
  getScoreLabel(score) {
    if (score == PASS_0) {
      return 'Zero';
    }
    else if (score == OUTER_RING_25) {
      return '25 Outer';
    }
    else if (score == BULLSEYE_50) {
      return '50 Bullseye';
    }
    return score;
  },
  prevPlayerTurn(optionalScoreAfter) {
    const currentPlayerIndex = this.state.players.indexOf(this.state.currentPlayerRef);
    let newPlayerIndex = currentPlayerIndex-1;
    if (newPlayerIndex < 0) {
      newPlayerIndex = this.state.players.length-1;
    }
    
    // Change to the previous player THEN apply the undone score
    this.state.currentPlayerRef = this.state.players[newPlayerIndex];
    if (typeof optionalScoreAfter === 'number') {
      this.state.currentPlayerRef.currentScore += optionalScoreAfter;
    }
  },
  nextPlayerTurn(optionalScoreBefore) {
    const currentPlayerIndex = this.state.players.indexOf(this.state.currentPlayerRef);
    let newPlayerIndex = currentPlayerIndex+1;
    if (newPlayerIndex >= this.state.players.length) {
      newPlayerIndex = 0;
    }
    
    // Apply the score to the current player THEN go to the next player
    if (typeof optionalScoreBefore === 'number') {
      this.applyScore(optionalScoreBefore);
    }
    this.state.currentPlayerRef = this.state.players[newPlayerIndex];
    this.state.currentThrows = 0;
  },
  addNewPlayer() {
    this.state.addPlayer = {
      name: this.getRandomName(),
      startScore: DEFAULT_GAME_SCORE
    };
  },
  saveNewPlayer(event) {
    event.preventDefault();
    
    if (this.state.addPlayer?.name?.trim().length &&
        !Number.isNaN(Number.parseInt(this.state.addPlayer?.startScore))) {
      this.state.addPlayer.currentScore = this.state.addPlayer.startScore;
      this.state.players.push(this.state.addPlayer);
      this.state.addPlayer = null;
      
      if (!this.state.currentPlayerRef) {
        this.state.currentPlayerRef = this.state.players[0];
      }
    }
  },
  removePlayer(playerObj) {
    this.state.players.splice(this.state.players.indexOf(playerObj), 1);
    
    this.state.currentPlayerRef = this.state.players[0];
    this.state.currentThrows = 0;
  },
  chooseScore(score, multiplier) {
    if (this.isSpecialScore(score)) {
      if (score == PASS_0) {
        score = 0;
      }
      this.applyThrow(1, score);
    }
    else {
      // Choose an initial score, change view to show multipliers
      if (typeof multiplier !== 'number') {
        this.state.dartMap = this.makeMultiplierMap(score);
        this.state.chosenScore = score;
      }
      // Have a score already, now choosing a multiplier
      else if (this.state.chosenScore !== null) {
        score *= multiplier;
        this.applyThrow(1, score);
        this.state.dartMap = DEFAULT_DART_MAP;
        this.state.chosenScore = null;
      }
    }
  },
  applyThrow(modifier, score, fromUndo) { // modifier = positive on valid throw, negative on Undo
    this.state.currentThrows += modifier;
    
    // Rotate to the next player automatically after our turn
    if (this.state.currentThrows >= 3) {
      this.nextPlayerTurn(score);
    }
    // If we undid until the previous player swap to them
    else if (this.state.currentThrows < 0) {
      this.prevPlayerTurn(score);
      this.state.currentThrows = 2;
    }
    else {
      this.applyScore(score, fromUndo);
    }
    
    if (modifier > 0) {
      this.state.lastScores.unshift(score);
    }
  },
  applyScore(score, fromUndo) {
    const potentialNewScore = this.state.currentPlayerRef.currentScore - score;
    
    if (!fromUndo) {
      if (potentialNewScore < 0) {
        alert(`${this.state.currentPlayerRef.name} threw a ${score} and BUSTED with ${potentialNewScore}, next turn...`);
        
        this.state.dartMap = DEFAULT_DART_MAP;
        this.state.chosenScore = null;
        for (let i = 0; i < this.state.currentThrows; i++) {
          this.doUndo();
        }
        
        this.nextPlayerTurn();
        return;
      }
      else if (!fromUndo && potentialNewScore === 0) {
        this.state.currentPlayerRef.currentScore = 0; // We did it
        
        alert(`${this.state.currentPlayerRef.name} WON!\n\nScores:\n${this.state.players.map(player => player.name + ': ' + player.currentScore).join('\n')}\n\nRestarting...`);
        window.location.reload();
        return;
      }
    }
    
    // Want to go back in time for an undo
    if (fromUndo) {
      score *= -1;
    }
    
    this.state.currentPlayerRef.currentScore -= score;
  },
  doUndo() {
    // If we have a temporary score chosen, but no multiplier, just clear that
    if (this.state.chosenScore !== null) {
      this.state.dartMap = DEFAULT_DART_MAP;
      this.state.chosenScore = null;
    }
    // Otherwise undo the last set score
    else if (this.state.lastScores?.length) {
      this.applyThrow(-1, this.state.lastScores.shift(), true);
    }
  },
  makeMultiplierMap(score) {
    const allKeys = Object.keys(DEFAULT_DART_MAP);
    const gridKeys = allKeys.slice(0, -3);
    const newMap = Object.fromEntries(allKeys.map((key) => [key, '']));

    const clickedIndex = gridKeys.indexOf(score.toString());
    const clickedCol = clickedIndex % COL_COUNT;
    const clickedRow = Math.floor(clickedIndex / COL_COUNT);
    const rowCount = Math.ceil(gridKeys.length / COL_COUNT);
    const direction = clickedRow + 2 < rowCount ? 1 : -1;

    [0, 1, 2].forEach((offset) => {
      const row = clickedRow + offset * direction;
      const index = row * COL_COUNT + clickedCol;

      newMap[gridKeys[index]] = `${offset + 1}x`;
    });
    
    return newMap;
  },
  getRandomName() {
    if (PLAYER_NAMES?.length) {
      const index = Math.floor(Math.random() * PLAYER_NAMES.length);
      return PLAYER_NAMES.splice(index, 1)[0];
    }
    return 'New';
  },
  changeColorPalette(isChecked) {
    if (isChecked) {
      Object.keys(DEFAULT_DART_MAP).forEach(key => {
        DEFAULT_DART_MAP[key] = COLOR_BLUE;
      });
    }
    else {
      DEFAULT_DART_MAP = structuredClone(ORIGINAL_DART_MAP);
    }
  },
}"
>
    <div class="header">
      <div class="undo-wrap">
        <button @click="doUndo()" :disabled="(state.chosenScore === null && !state.lastScores?.length)" x-text="`Undo (${state.chosenScore ?? (state.lastScores?.[0] ?? '...')})`"></button>
      </div>
      <div class="player-wrap">
        <span x-text="`${state.currentPlayerRef?.name ?? 'None'} (${state.currentPlayerRef?.currentScore ?? 'Add a new player!'})`"></span>
        <template x-for="i in state.currentThrows">
          <img src="img/dart.png" :alt="`Dart ${i}`" :title="`Dart ${i}`" class="dart-image">
        </template>
      </div>
      <div class="settings-wrap"><button @click="state.showSettings = !state.showSettings" :disabled="!state.players?.length" x-text="state.showSettings ? 'Save' : 'Settings'"></button></div>
    </div>
    <template x-if="!state.showSettings && state.currentPlayerRef">
      <div>
        <div id="score-buttons">
          <template x-for="[score, cell] in Object.entries(state.dartMap)" :key="score">
            <div :style="score == BULLSEYE_50 ? 'grid-column: span 2;' : ''">
              <button
                x-text="state.chosenScore === null
                  ? (!isSpecialScore(score) ? score : getScoreLabel(score))
                  : (cell || '-')"
                :class="`point-button${isSpecialScore(score) ? (score == BULLSEYE_50 ? '-wide' : '-sm') : ''}`"
                :style="`visibility: ${cell ? 'visible' : 'hidden'}; background-color: ${state.chosenScore === null ? (DEFAULT_DART_MAP[score] ?? COLOR_GREEN) : 'indigo'};`"
                @click="state.chosenScore === null
                  ? chooseScore(Number.parseInt(score, 10))
                  : chooseScore(state.chosenScore, Number.parseInt(cell, 10))">
              </button>
            </div>
          </template>
        </div>
      </div>
    </template>
    <template x-if="state.showSettings">
    <div>
      <div class="settings-card">
        <label>
          <input type="checkbox" x-model="state.scoreSingleColor" @change="changeColorPalette($event.target.checked)"></input>
          Score buttons use <span :style="`background-color: ${COLOR_BLUE}`">single color</span> instead of <span :style="`background-color: ${COLOR_RED}`">red</span> and <span :style="`background-color: ${COLOR_GREEN}`">green</span>
        </label>
        <br><br><hr/><br>
        <label>
          <button @click="localStorage.removeItem(LS_GAMESTATE); window.location.reload();">Delete Saves</button>
          Clear entire local saved game state
        </label>
      </div>
      <div class="settings-card">
        <ol>
          <template x-for="player in state.players">
            <li>
              <b x-text="player.name"></b>
              <span x-text="`(Score ${player.currentScore} of ${player.startScore})`"></span>
              <br>
              <button @click="removePlayer(player)">Remove</button>
              <button @click="player.currentScore = window.prompt(`Enter adjusted score (current is ${player.currentScore})`, player.currentScore) ?? player.currentScore">Change Score</button>
              <button @click="state.currentPlayerRef = player">Give Turn</button>
            </li>
          </template>
          <li>
            <template x-if="!state.addPlayer">
              <button @click="addNewPlayer();">Add New Player</button>
            </template>
            <template x-if="state.addPlayer">
              <form class="new-player-wrap">
                <input x-ref="nameIn" x-model="state.addPlayer.name" placeholder="Name" autofocus></input>
                <input x-model="state.addPlayer.startScore" placeholder="Goal Score"></input>
                <br><br>
                <button @click="saveNewPlayer($event)">Save New Player</button>
              </form>
            </template>
          </li>
        </ol>
      </div>
    </div>
    </template>
</body>

</html>
